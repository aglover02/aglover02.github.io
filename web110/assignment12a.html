<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="style.css" rel="stylesheet" type="text/css">
  </head>

  <body>
    <h1 id="heading"></h1>
    <script>document.getElementById("heading").innerHTML = "Assignment 12 - Summary by Autumn Glover";</script>
    <p id="date"></p>
    <script>
    document.getElementById("date").innerHTML = Date();
    </script>
    
    <canvas id="canvas" width="360" height="240">
    This text is displayed if your browser does not support HTML5 Canvas.
  </canvas>
  
   <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
  
    // Set stroke and fill to pink
    ctx.strokeStyle = "dark pink";
    ctx.fillStyle = "dark pink";
  
    // Select font, alignment, draw text, and fill characters
    ctx.font = "36px monospace";
    ctx.textAlign= "center";
    ctx.strokeText("Autumn Glover!", 160, 50);
    ctx.fillText("Autumn Glover!", 160, 50);
  </script>
    
  </body>

</html>
