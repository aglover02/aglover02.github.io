<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="style.css" rel="stylesheet" type="text/css">
  </head>

  <body>
    <h1 id="heading"></h1>
    <script>document.getElementById("heading").innerHTML = "Assignment 12 - Summary by Autumn Glover";</script>
    <p id="date"></p>
    <script>
    document.getElementById("date").innerHTML = Date();
    </script>
    
    <canvas id="example" width="360" height="240">
    This text is displayed if your browser does not support HTML5 Canvas.
  </canvas>
  
   <script>
    var example = document.getElementById("example");
    var context = example.getContext("2d");
  
    // Set stroke and fill to blue
    context.strokeStyle = "pink";
    context.fillStyle = "blue";
  
    // Select font, alignment, draw text, and fill characters
    context.font = "36px sans-serif";
    context.textAlign="center";
    context.strokeText("HTML5 Canvas", 160, 50);
    context.fillText("HTML5 Canvas", 160, 50);
  </script>
    
  </body>

</html>
